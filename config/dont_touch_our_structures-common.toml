[general]
	#Whether the mod should affect singleplayer worlds
	affect_singleplayer = false
	#Whether players with OP permission level can bypass restrictions
	bypass_with_op = true
	#Minimum OP level required to bypass restrictions (if bypass_with_op is true)
	# Default: 2
	# Range: 1 ~ 4
	op_bypass_level = 2
	#Enable debug logging for troubleshooting
	enable_debug_logging = false

[structure_types]
	#Whether to protect surface structures (those with terrain adaptation like BURY, BEARD_THIN, BEARD_BOX)
	protect_surface = true
	#Whether to protect underground structures (those with NONE terrain adaptation)
	protect_underground = false
	#List of terrain adaptations to consider as 'surface' structures
	#Valid values: NONE, BURY, BEARD_THIN, BEARD_BOX
	terrain_adaptations_to_protect = ["BURY", "BEARD_THIN", "BEARD_BOX"]
	#List of generation steps to protect
	#Valid values: RAW_GENERATION, LAKES, LOCAL_MODIFICATIONS, UNDERGROUND_STRUCTURES,
	#SURFACE_STRUCTURES, STRONGHOLDS, UNDERGROUND_ORES, UNDERGROUND_DECORATION,
	#FLUID_SPRINGS, VEGETAL_DECORATION, TOP_LAYER_MODIFICATION
	generation_steps_to_protect = ["SURFACE_STRUCTURES"]

[structures]
	#How to use the structure lists:
	#WHITELIST - only listed structures are protected
	#BLACKLIST - all structures except listed ones are protected
	#DISABLED - ignore the structure list entirely
	#Allowed Values: WHITELIST, BLACKLIST, DISABLED
	filter_mode = "BLACKLIST"
	#Structures to protect when filter_mode is WHITELIST
	whitelist = []
	#Structures to exclude from protection when filter_mode is BLACKLIST
	blacklist = []

[dimensions]
	#How to filter dimensions:
	#WHITELIST - only protect structures in listed dimensions
	#BLACKLIST - protect structures in all dimensions except listed ones
	#DISABLED - no dimension filtering
	#Allowed Values: WHITELIST, BLACKLIST, DISABLED
	filter_mode = "DISABLED"
	#Dimensions where protection is active (when filter_mode is WHITELIST)
	#Example: ["minecraft:overworld", "minecraft:the_nether"]
	whitelist = ["minecraft:overworld"]
	#Dimensions where protection is disabled (when filter_mode is BLACKLIST)
	blacklist = []

[biomes]
	#How to filter biomes:
	#WHITELIST - only protect structures in listed biomes
	#BLACKLIST - protect structures in all biomes except listed ones
	#DISABLED - no biome filtering
	#Allowed Values: WHITELIST, BLACKLIST, DISABLED
	filter_mode = "DISABLED"
	#Biomes where protection is active (when filter_mode is WHITELIST)
	whitelist = []
	#Biomes where protection is disabled (when filter_mode is BLACKLIST)
	blacklist = []

[padding]
	#Whether to add padding around structures where claiming is also prevented
	enable = false
	#Default number of chunks to pad around protected structures (0-16)
	# Default: 1
	# Range: 0 ~ 16
	default_chunks = 1
	#Custom padding for specific structures (Format: 'modid:structure_id=paddingValue')
	#Example: ["minecraft:village_plains=2", "minecraft:monument=3"]
	custom_structure_padding = []

[messages]
	#Custom denial message. Leave empty to auto-generate based on structure info.
	#Placeholders: {structure_name}, {structure_type}, {chunk_x}, {chunk_z}
	custom_denial_message = ""
	#Include the structure name in auto-generated denial messages
	include_structure_name = true
	#Include the structure type (surface/underground) in auto-generated denial messages
	include_structure_type = true
	#Include chunk coordinates in auto-generated denial messages
	include_coordinates = false

[performance]
	#Enable caching of protection checks for better performance
	enable_cache = true
	#How long cached entries are valid (in seconds)
	# Default: 300
	# Range: 10 ~ 3600
	cache_ttl_seconds = 300
	#Maximum number of entries in the cache
	# Default: 1000
	# Range: 100 ~ 10000
	cache_max_entries = 1000

[compat]
	#Enable FTB Chunks integration
	ftb_chunks_enabled = true
	#Enable Open Parties and Claims integration
	opac_enabled = true
	#Use mixin injection for OPaC (prevents claims at source, no flicker)
	#If false, falls back to reactive listener approach
	opac_use_mixin = true
